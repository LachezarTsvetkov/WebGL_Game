<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bug Exterminator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="canvas-container"></div>

        <div id="hud">
            <h2 id="ui-score">Score: 0</h2>
            <h2 id="ui-hp">HP: 3</h2>
            <h2 id="ui-coins" style="color: yellow;">Coins: 0</h2>
        </div>

        <div id="main-menu" class="overlay">
            <h1>BUG EXTERMINATOR</h1>
            <p>Use Arrows to Move. Press/Hold Z to Shoot.</p>
            <div class="button-group">
                <button onclick="startGame()">START RUN</button>
                <button onclick="openShop()">UPGRADE SHOP</button>
            </div>
        </div>

        <div id="shop-menu" class="overlay hidden">
            <h1>BLACK MARKET</h1>
            <h2 id="shop-coins" style="color: yellow;">Your Coins: 0</h2>
            <div class="shop-items">
                <button onclick="buyUpgrade('hp')">Max HP +1 (Cost: <span id="cost-hp">10</span>)</button>
                <button onclick="buyUpgrade('dmg')">Bullet Damage +1 (Cost: <span id="cost-dmg">15</span>)</button>
                <button onclick="buyUpgrade('spread')">Unlock Spread Shot (Cost: <span id="cost-spread">50</span>)</button>
            </div>
            <button onclick="closeShop()" style="margin-top: 30px; background-color: orangered; color: white;">BACK TO MENU</button>
        </div>

        <div id="game-over" class="overlay hidden">
            <h1>GAME OVER</h1>
            <p id="final-score">Final Score: 0</p>
            <p id="earned-coins" style="color: yellow;">Coins Earned: 0</p>
            <div class="button-group">
                <button onclick="restartGame()">PLAY AGAIN</button>
                <button onclick="openShop()">VISIT SHOP</button>
            </div>
        </div>
    </div>

    <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-filters@latest/dist/browser/pixi-filters.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
