<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bug Exterminator</title>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 2px solid brown;
        }
    </style>
</head>

<body>
    <script src="https://pixijs.download/v7.3.2/pixi.min.js"></script>
    <script>
        const app = new PIXI.Application({ 
            width: 1200, 
            height: 600, 
            backgroundColor: 0x111111 });
        document.body.appendChild(app.view);

        //-----Texture generation-----\\
        function createTex(w, h, color) { 
            const g = new PIXI.Graphics(); 
            g.beginFill(color); 
            g.drawRect(0, 0, w, h); 
            return app.renderer.generateTexture(g); 
        }
        const texPlayer = createTex(40, 50, 0x2040f5);
        const texGround = createTex(1200, 50, 0x19693b);
        const texBug = createTex(40, 40, 0xe74c3c);
        const texPlatform = createTex(120, 30, 0x555555);
        const texNest = createTex(40, 40, 0x2ecc71);
        const texBullet = createTex(15, 5, 0xf1c40f);


        //-----Render ground, player, and UI-----\\
        const ground = new PIXI.TilingSprite(texGround, 1200, 50); 
        ground.y = 550;
        const gameContainer = new PIXI.Container(); 
        const uiContainer = new PIXI.Container();
        app.stage.addChild(ground, gameContainer, uiContainer);

        //UI
        const style = new PIXI.TextStyle({ 
            fontSize: 24, 
            fill: ['#ffffff'], 
            fontWeight: 'bold' 
        });
        const scoreText = new PIXI.Text('Score: 0', style);
        const hpText = new PIXI.Text('HP: 3', style);
        scoreText.x = 20; 
        scoreText.y = 20; 
        hpText.x = 20; 
        hpText.y = 55;
        uiContainer.addChild(scoreText, hpText);

        //Player
        const player = new PIXI.Sprite(texPlayer); 
        player.x = 100; 
        player.y = 300; 
        player.vy = 0; 
        gameContainer.addChild(player);

        //-----Game variables-----\\
        const crawlers = [], nests = [], platforms = [], bullets = [];
        const keys = {}; 
        let frames = 0, score = 0, hp = 300, isGameOver = false;
        const gravity = 0.25, jumpForce = -8.5, moveSpeed = 4, scrollSpeed = 2.5;
        let lastPlatformY = ground.y;

        //-----Input logic-----\\
        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            keys[e.code] = false; 
        });

        //-----Check the collision-----\\
        function checkCollision(obj1, obj2) {
            const b1 = obj1.getBounds();
            const b2 = obj2.getBounds();
            return b1.x < b2.x + b2.width && b1.x + b1.width > b2.x && b1.y < b2.y + b2.height && b1.y + b1.height > b2.y;
        }

        //-----Game logic-----\\
        app.ticker.add(() => {
            if (isGameOver) return;
            frames++; 
            ground.tilePosition.x -= 2.5;

            player.vy += gravity; 
            player.y += player.vy;
            let onGround = false;
            
            if (player.y + player.height > ground.y) { 
                player.y = ground.y - player.height; 
                player.vy = 0;
                onGround = true; 
            }

            //Move the platforms
            platforms.forEach(plat => {
                if (player.vy >= 0 && player.y + player.height >= plat.y && player.y + player.height <= plat.y + player.vy + 2 && player.x + player.width > plat.x && player.x < plat.x + plat.width) {
                    player.y = plat.y - player.height; 
                    player.vy = 0; 
                    onGround = true;
                }
            });

            //Move the player
            if (keys['ArrowRight'] && player.x < 600) player.x += moveSpeed;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= moveSpeed;
            if ((keys['ArrowUp'] || keys['Space']) && onGround) player.vy = jumpForce;

            //Shoot logic
            if (keys['KeyZ'] && frames % 20 === 0) {
                const b = new PIXI.Sprite(texBullet); 
                b.x = player.x + 40; 
                b.y = player.y + 25; 
                bullets.push(b); 
                gameContainer.addChild(b);
            }

            //-----Spawning logic-----\\
            //Platform
            if (frames % 120 === 0) {
                console.log("Spaned plat");
                const plat = new PIXI.Sprite(texPlatform); 
                plat.x = 1250;
                plat.y = Math.random() * ((ground.y - 40) - Math.max(200, lastPlatformY - 80)) + Math.max(200, lastPlatformY - 80);
                lastPlatformY = plat.y; 
                platforms.push(plat); 
                gameContainer.addChild(plat);
            }

            //Crawler
            if (frames % 150 === 0) { 
                const bug = new PIXI.Sprite(texBug); 
                console.log("Spaned bug");
                bug.x = 1250; 
                bug.y = ground.y - 40; 
                crawlers.push(bug); 
                gameContainer.addChild(bug); 
            }

            //Nest
            if (frames % 400 === 0) { 
                const nest = new PIXI.Sprite(texNest); 
                nest.x = 1250; 
                nest.y = ground.y - 40; 
                nests.push(nest); 
                gameContainer.addChild(nest); 
            }

            //Bullet collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += 10;
                if (bullets[i].x > 1250) { 
                    gameContainer.removeChild(bullets[i]); 
                    bullets.splice(i, 1); 
                }
            }

            //Move objects and destroy them once they leave the screen
            [platforms, crawlers, nests].forEach(arr => {
                for (let i = arr.length - 1; i >= 0; i--) {
                    arr[i].x -= scrollSpeed;
                    if (arr[i].x < -140) { 
                        gameContainer.removeChild(arr[i]); 
                        arr.splice(i, 1); 
                    }
                }
            });

            //-----Collision between enemies and Player-----\\
            for (let i = crawlers.length - 1; i >= 0; i--) {
                //Add small movement speed to the cralwers
                crawlers[i].x -= 1;
                if (checkCollision(player, crawlers[i])) {
                    hp--; 
                    hpText.text = 'HP: ' + hp;
                    gameContainer.removeChild(crawlers[i]); 
                    crawlers.splice(i, 1);
                    if (hp <= 0) isGameOver = true; 
                    continue;
                }
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (crawlers[i] && checkCollision(bullets[j], crawlers[i])) {
                        score += 10; 
                        scoreText.text = 'Score: ' + score;
                        gameContainer.removeChild(crawlers[i]); 
                        gameContainer.removeChild(bullets[j]);
                        crawlers.splice(i, 1); 
                        bullets.splice(j, 1); break;
                    }
                }
            }
        });
    </script>
</body>

</html>
